version: "3.9"

services:
  indigo:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: indigo-site
    restart: unless-stopped
    ports:
      - "8787:8787"
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      HOST: ${HOST:-0.0.0.0}
      PORT: ${PORT:-8787}
      CORS_ORIGIN: ${CORS_ORIGIN:-}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}

