services:
  indigo:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: indigo-site
    restart: unless-stopped
    ports:
      - "8787:8787"
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      HOST: ${HOST:-0.0.0.0}
      PORT: ${PORT:-8787}
      CORS_ORIGIN: ${CORS_ORIGIN:-}
      DB_PATH: ${DB_PATH:-/app/data/indigo.db}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
    volumes:
      - ./site/data:/app/site/data
      - ./data:/app/data

