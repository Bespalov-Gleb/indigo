server {
    listen 80;
    listen [::]:80;
    server_name dev-studio-indigo.ru www.dev-studio-indigo.ru;

    # Для первичной проверки до выпуска SSL:
    # return 301 http://dev-studio-indigo.ru$request_uri;

    location / {
        return 301 /site/index.html;
    }

    location /site/ {
        proxy_pass http://127.0.0.1:8787;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    location /api/ {
        proxy_pass http://127.0.0.1:8787;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    location = /healthz {
        proxy_pass http://127.0.0.1:8787/healthz;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    # Можно закрыть админку по IP:
    # location /site/admin/ {
    #     allow 1.2.3.4;
    #     deny all;
    #     proxy_pass http://127.0.0.1:8787;
    # }
}

